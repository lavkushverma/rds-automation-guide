<!DOCTYPE html>
<html>
<head>
    <title>Download Test</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
    <h1>Library Test</h1>
    <button onclick="testLibraries()">Test All Libraries</button>
    <button onclick="testDownload()">Test Simple Download</button>
    <pre id="output"></pre>
    
    <script>
        function log(msg) {
            document.getElementById('output').textContent += msg + '\n';
        }
        
        function testLibraries() {
            document.getElementById('output').textContent = '';
            log('Testing libraries...\n');
            
            log('JSZip: ' + (typeof JSZip !== 'undefined' ? '✓ Loaded' : '✗ Not loaded'));
            log('FileSaver: ' + (typeof saveAs !== 'undefined' ? '✓ Loaded' : '✗ Not loaded'));
            log('jsPDF: ' + (typeof window.jspdf !== 'undefined' ? '✓ Loaded' : '✗ Not loaded'));
        }
        
        function testDownload() {
            try {
                const blob = new Blob(['Test content'], { type: 'text/plain' });
                saveAs(blob, 'test.txt');
                log('\n✓ Download initiated successfully!');
            } catch(e) {
                log('\n✗ Error: ' + e.message);
            }
        }
    </script>
</body>
</html>
